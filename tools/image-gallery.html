<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KIWL 静态站图片分析</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background: #f5f7fa; color: #1a1a2e; }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    .meta { color: #666; margin-bottom: 24px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .stat strong { display: block; font-size: 1.75rem; color: #2563eb; }
    .stat span { font-size: .85rem; color: #666; }
    .filters { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    input, select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    input { flex: 1; min-width: 200px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .card img { width: 100%; aspect-ratio: 1; object-fit: contain; background: #fafafa; display: block; }
    .card p { margin: 0; padding: 8px; font-size: 10px; word-break: break-all; color: #444; line-height: 1.3; max-height: 3.9em; overflow: hidden; }
    .card.missing img { opacity: .3; }
    .card.missing::after { content: '缺失'; position: absolute; top: 8px; right: 8px; background: #ef4444; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
    .card { position: relative; }
    .back { display: inline-block; margin-bottom: 16px; color: #2563eb; text-decoration: none; }
    .back:hover { text-decoration: underline; }
    #count { margin-bottom: 12px; color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <a class="back" href="/">← 返回网站首页</a>
  <h1>KIWL Plastic 静态镜像 — 图片资源分析</h1>
  <p class="meta">扫描 HTML/CSS 中引用的 wp-content/uploads 图片，展示本地可用状态</p>

  <div class="stats" id="stats"></div>

  <div class="filters">
    <input type="search" id="search" placeholder="搜索文件名…">
    <select id="year">
      <option value="">全部年份</option>
    </select>
    <select id="status">
      <option value="">全部状态</option>
      <option value="local">已下载</option>
      <option value="missing">缺失</option>
    </select>
  </div>
  <div id="count"></div>
  <div class="grid" id="grid"></div>

  <script>
    const SAMPLE_LIMIT = 200;
    let allImages = [];

    async function loadManifest() {
      const res = await fetch('/tools/image-manifest.json');
      allImages = await res.json();
      renderStats();
      populateYears();
      renderGrid();
    }

    function renderStats() {
      const byExt = {};
      const byYear = {};
      allImages.forEach(p => {
        const ext = p.split('.').pop().toLowerCase();
        byExt[ext] = (byExt[ext] || 0) + 1;
        const year = p.match(/uploads\/(\d{4})/)?.[1] || '?';
        byYear[year] = (byYear[year] || 0) + 1;
      });
      document.getElementById('stats').innerHTML = `
        <div class="stat"><strong>${allImages.length}</strong><span>图片引用总数</span></div>
        <div class="stat"><strong>${Object.keys(byYear).length}</strong><span>年份目录</span></div>
        <div class="stat"><strong>${byExt.jpg || 0}</strong><span>JPG</span></div>
        <div class="stat"><strong>${byExt.png || 0}</strong><span>PNG</span></div>
        <div class="stat"><strong>${byExt.svg || 0}</strong><span>SVG</span></div>
        <div class="stat"><strong>${byExt.webp || 0}</strong><span>WebP</span></div>
      `;
    }

    function populateYears() {
      const years = [...new Set(allImages.map(p => p.match(/uploads\/(\d{4})/)?.[1]).filter(Boolean))].sort();
      const sel = document.getElementById('year');
      years.forEach(y => {
        const o = document.createElement('option');
        o.value = y; o.textContent = y;
        sel.appendChild(o);
      });
    }

    function renderGrid() {
      const q = document.getElementById('search').value.toLowerCase();
      const year = document.getElementById('year').value;
      const status = document.getElementById('status').value;

      let filtered = allImages.filter(p => {
        if (q && !p.toLowerCase().includes(q)) return false;
        if (year && !p.includes(`/uploads/${year}/`)) return false;
        return true;
      });

      if (status) {
        filtered = filtered.slice(0, 500);
      } else {
        filtered = filtered.slice(0, SAMPLE_LIMIT);
      }

      const grid = document.getElementById('grid');
      grid.innerHTML = filtered.map(p => {
        const src = '/' + p;
        return `<div class="card" data-path="${p}">
          <img src="${src}" alt="" loading="lazy" onerror="this.closest('.card').classList.add('missing')">
          <p>${p.replace('wp-content/uploads/', '')}</p>
        </div>`;
      }).join('');

      document.getElementById('count').textContent =
        `显示 ${filtered.length} / ${allImages.length} 张（首页预览限制 ${SAMPLE_LIMIT} 张，请用搜索筛选）`;
    }

    ['search', 'year', 'status'].forEach(id =>
      document.getElementById(id).addEventListener('input', renderGrid)
    );

    loadManifest();
  </script>
</body>
</html>
